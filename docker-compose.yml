services:
  db:
    image: postgres:15-alpine
    container_name: qazaqair-db-1
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: airmonitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qazaqair-backend-1
    restart: always
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/airmonitor
      - SSL_CERTFILE=/app/backend/certs/cert.pem
      - SSL_KEYFILE=/app/backend/certs/key.pem
    ports:
      - "8000:8000"
      - "2222:2222"
    volumes:
      - ./backend:/app/backend
      - ./backend/certs:/app/backend/certs
    networks:
      - app-network
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  frontend_new:
    build:
      context: ./frontend_new
      dockerfile: Dockerfile
    container_name: qazaqair-frontend-1
    restart: always
    ports:
      - "3001:80"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

  graphite:
    image: graphiteapp/graphite-statsd:latest
    container_name: qazaqair-graphite-1
    restart: always
    ports:
      - "2003:2003"
      - "8082:80"
      - "8125:8125/udp"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  n8n:
    image: n8nio/n8n:latest
    container_name: qazaqair-n8n-1
    restart: always
    environment:
      # - N8N_PATH=/n8n/
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=airmonitor
      - DB_POSTGRESDB_USER=user
      - DB_POSTGRESDB_PASSWORD=password
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost/n8n/
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - app-network
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  zabbix-db:
    image: postgres:15-alpine
    container_name: zabbix-db
    restart: always
    environment:
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix_password
      POSTGRES_DB: zabbix
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-6.4-latest
    container_name: zabbix-server
    restart: always
    environment:
      DB_SERVER_HOST: zabbix-db
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix_password
      POSTGRES_DB: zabbix
    ports:
      - "10051:10051"
    networks:
      - app-network
    depends_on:
      - zabbix-db
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-6.4-latest
    container_name: zabbix-web
    restart: always
    environment:
      ZBX_SERVER_HOST: zabbix-server
      DB_SERVER_HOST: zabbix-db
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix_password
      POSTGRES_DB: zabbix
      PHP_TZ: "Asia/Almaty"
    ports:
      - "8086:8080"
    networks:
      - app-network
    depends_on:
      - zabbix-server
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

  app:
    image: nginx:alpine
    container_name: qazaqair-app-1
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/certs:/etc/nginx/ssl:ro
      - ./html:/usr/share/nginx/html:ro
    networks:
      - app-network
    depends_on:
      - db
      - backend
      - frontend_new
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    ports:
      - "9000:9000"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'

  prometheus:
    image: prom/prometheus:latest
    container_name: qazaqair-prometheus-1
    restart: always
    user: "root"
    volumes:
      - ./monitoring/prometheus/prometheus-enhanced.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
    ports:
      - "9090:9090"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  grafana:
    image: grafana/grafana:latest
    container_name: qazaqair-grafana-1
    restart: always
    user: "root"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_RENDERING_ENABLED=false
      - GF_IMAGE_RENDERER_PLUGIN_ENABLED=false
      - GF_PLUGINS_ENABLE_ALPHA=false
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - app-network
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

  renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: grafana-renderer
    restart: always
    ports:
      - "8081:8081"
    networks:
      - app-network
    environment:
      - ENABLE_METRICS=true
      - IGNORE_HTTPS_ERRORS=true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # System Metrics - Node Exporter
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /etc/hostname:/etc/nodename:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.netdev.device-exclude=^(docker|veth|br-|lo)($$|:)'
      - '--collector.netclass.ignored-devices=^(docker|veth|br-|lo)($$|:)'
      - '--collector.systemd.unit-exclude=^(docker|containerd|kubelet)\\.service$$'
      - '--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$'
    ports:
      - "9100:9100"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M
          cpus: '0.05'

  # Container Metrics - cAdvisor
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - app-network
    command:
      - --port=8080
      - --docker_only=true
      - --disable_metrics=percpu
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

  # PostgreSQL Metrics
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://user:password@db:5432/airmonitor?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - app-network
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M
          cpus: '0.05'

  # Nginx Metrics
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    restart: unless-stopped
    command:
      - -nginx.scrape-uri=http://qazaqair-app-1/nginx_status
    ports:
      - "9113:9113"
    networks:
      - app-network
    depends_on:
      - app
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.05'
        reservations:
          memory: 32M
          cpus: '0.02'

  # Blackbox Exporter
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    restart: unless-stopped
    ports:
      - "9115:9115"
    networks:
      - app-network
    volumes:
      - ./monitoring/blackbox:/config
    command:
      - '--config.file=/config/blackbox.yml'
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M
          cpus: '0.05'

  # AlertManager
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - app-network
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

  # Nagios Core - система мониторинга
  nagios:
    image: jasonrivers/nagios:latest
    container_name: qazaqair-nagios-1
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - nagios_etc:/opt/nagios/etc
      - nagios_var:/opt/nagios/var
      - nagios_plugins:/opt/nagios/libexec
      - nagios_custom_plugins:/opt/Custom-Nagios-Plugins
      - nagiosgraph_var:/opt/nagiosgraph/var
      - nagiosgraph_etc:/opt/nagiosgraph/etc
      - ./monitoring/nagios/nagios.cfg:/opt/nagios/etc/nagios.cfg:ro
      - ./monitoring/nagios/conf.d:/opt/nagios/etc/conf.d:ro
    environment:
      - NAGIOSADMIN_USER=nagiosadmin
      - NAGIOSADMIN_PASS=nagiosadmin
      - NAGIOS_TIMEZONE=Asia/Almaty
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # NRPE Agent для Nagios
  nagios-nrpe:
    image: hub.docker.com/r/gasi/nrpe
    container_name: qazaqair-nagios-nrpe-1
    restart: unless-stopped
    ports:
      - "5666:5666"
    volumes:
      - /:/hostfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - ./monitoring/nagios/nrpe.cfg:/etc/nagios/nrpe.cfg:ro
    environment:
      - NRPE_ALLOWED_HOSTS=nagios,127.0.0.1,172.20.0.0/16
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M
          cpus: '0.05'

networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  portainer_data:
  postgres_data:
  n8n_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  nagios_etc:
  nagios_var:
  nagios_plugins:
  nagios_custom_plugins:
  nagiosgraph_var:
  nagiosgraph_etc:
