# Nagios Core Configuration File

# LOG FILE
log_file=/opt/nagios/var/nagios.log

# CFG FILES
cfg_file=/opt/nagios/etc/objects/commands.cfg
cfg_file=/opt/nagios/etc/objects/contacts.cfg
cfg_file=/opt/nagios/etc/objects/timeperiods.cfg
cfg_file=/opt/nagios/etc/objects/templates.cfg

# CFG DIRECTORIES
cfg_dir=/opt/nagios/etc/conf.d

# OBJECT CACHE FILE
object_cache_file=/opt/nagios/var/objects.cache

# PRE-CACHED OBJECT FILE
precached_object_file=/opt/nagios/var/objects.precache

# RESOURCE FILE
resource_file=/opt/nagios/etc/resource.cfg

# STATUS FILE
status_file=/opt/nagios/var/status.dat
status_update_interval=10

# CHECK RESULT PATH
check_result_path=/opt/nagios/var/spool/checkresults

# MAX CHECK RESULT FILE AGE
max_check_result_file_age=3600

# LOCK FILE
lock_file=/opt/nagios/var/nagios.lock

# TEMP FILE
temp_file=/opt/nagios/var/nagios.tmp

# TEMP PATH
temp_path=/tmp

# EVENT BROKER OPTIONS
event_broker_options=-1

# LOG ROTATION METHOD
log_rotation_method=d

# LOG ARCHIVE PATH
log_archive_path=/opt/nagios/var/archives

# LOGGING OPTIONS
use_syslog=1
log_notifications=1
log_service_retries=1
log_host_retries=1
log_event_handlers=1
log_initial_states=0
log_current_states=1
log_external_commands=1
log_passive_checks=1

# GLOBAL HOST/SERVICE EVENT HANDLERS
global_host_event_handler=
global_service_event_handler=

# SERVICE INTER-CHECK DELAY METHOD
service_inter_check_delay_method=s

# MAXIMUM SERVICE CHECK SPREAD
max_service_check_spread=30

# SERVICE CHECK INTERLEAVE FACTOR
service_interleave_factor=s

# HOST INTER-CHECK DELAY METHOD
host_inter_check_delay_method=s

# MAXIMUM HOST CHECK SPREAD
max_host_check_spread=30

# TIMING INTERVALS
interval_length=60

# CHECKS
use_aggressive_host_checking=0
execute_service_checks=1
accept_passive_service_checks=1
execute_host_checks=1
accept_passive_host_checks=1
enable_notifications=1
enable_event_handlers=1
enable_flap_detection=1
enable_failure_prediction=0
process_performance_data=1

# OBSESSIVE COMPULSIVE CHECKS
obsess_over_services=0
obsess_over_hosts=0

# FRESHNESS CHECKS
check_service_freshness=1
check_host_freshness=0

# AUTO-RESCHEDULING
auto_reschedule_checks=0
auto_rescheduling_interval=30
auto_rescheduling_window=180

# FLAPPING SETTINGS
low_service_flap_threshold=5.0
high_service_flap_threshold=20.0
low_host_flap_threshold=5.0
high_host_flap_threshold=20.0

# SOFT STATE DEPENDENCIES
soft_state_dependencies=0

# CHECK COMMAND TIMEOUT
service_check_timeout=60
host_check_timeout=30
event_handler_timeout=30
notification_timeout=30
ocsp_timeout=5
ochp_timeout=5
perfdata_timeout=5

# RETAIN STATE
retain_state_information=1
state_retention_file=/opt/nagios/var/retention.dat
retention_update_interval=60
use_retained_program_state=1
use_retained_scheduling_info=1

# INTERVALS
sleep_time=0.25
service_check_reaper_frequency=10
service_check_reaper_max_count=100
max_check_result_reaper_time=30
interval_length=60

# MAX CONCURRENT CHECKS
max_concurrent_checks=0
check_result_reaper_frequency=10
max_check_result_file_age=3600
max_check_result_reaper_time=30

# BUFFER
buffered_host_checks=0
buffered_service_checks=0

# CACHED CHECKS
cached_host_check_horizon=15
cached_service_check_horizon=15
enable_predictive_host_dependency_checks=1
enable_predictive_service_dependency_checks=1

# CHILD PROCESSES
use_large_installation_tweaks=0
free_child_process_memory=1
child_processes_fork_twice=1

# DAEMON
daemon_dumps_core=0

# EMBEDDED PERL
disable_embedded_perl=0
use_embedded_perl_implicitly=1

# P1 FILE
p1_file=/opt/nagios/bin/p1.pl

# EXTERNAL COMMANDS
check_external_commands=1
command_check_interval=-1
command_file=/opt/nagios/var/rw/nagios.cmd
external_command_buffer_slots=4096

# CONCURRENCY
lock_file=/opt/nagios/var/nagios.lock
temp_file=/opt/nagios/var/nagios.tmp
temp_path=/tmp

# LOGGING
log_file=/opt/nagios/var/nagios.log
log_archive_path=/opt/nagios/var/archives
use_syslog=1
log_notifications=1
log_service_retries=1
log_host_retries=1
log_event_handlers=1
log_initial_states=0
log_current_states=1
log_external_commands=1
log_passive_checks=1

# NOTIFICATIONS
enable_notifications=1

# SERVICE CHECKS
execute_service_checks=1
accept_passive_service_checks=1
service_check_timeout=60
max_service_check_spread=30

# HOST CHECKS
execute_host_checks=1
accept_passive_host_checks=1
host_check_timeout=30
max_host_check_spread=30

# EVENT HANDLERS
enable_event_handlers=1
event_handler_timeout=30

# FLAP DETECTION
enable_flap_detection=1
low_service_flap_threshold=5.0
high_service_flap_threshold=20.0
low_host_flap_threshold=5.0
high_host_flap_threshold=20.0

# PERFORMANCE DATA
process_performance_data=1
host_perfdata_command=process-host-perfdata
service_perfdata_command=process-service-perfdata

# DATE FORMAT
date_format=us

# TIMEZONE
use_timezone=Asia/Almaty

# ILLEGAL CHARACTERS
illegal_object_name_chars=`~!$%^&*"|'<>?,()=
illegal_macro_output_chars=`~$^&"|'<>

# REGULAR EXPRESSIONS
use_regexp_matching=0
use_true_regexp_matching=0

# ADMIN EMAIL
admin_email=nagios@localhost
admin_pager=pagenagios@localhost

# DAEMON USER
daemon_dumps_core=0
daemon_user=nagios
daemon_group=nagios

# PRECACHED OBJECT FILE
precached_object_file=/opt/nagios/var/objects.precache
