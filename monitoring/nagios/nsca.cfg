# NSCA Configuration File

# PORT NUMBER
server_port=5667

# USER TO RUN AS
nsca_user=nagios

# GROUP TO RUN AS
nsca_group=nagios

# PID FILE
pid_file=/var/run/nsca.pid

# TEMP FILE
temp_file=/var/run/nsca.tmp

# MAX PACKET AGE
max_packet_age=30

