decryption_method=1

# PASSWORD
# password=your_password_here

# COMMAND FILE
command_file=/opt/nagios/var/rw/nagios.cmd

# ALTERNATE SOCKET
# alternate_socket=

# AGGREGATE WRITES
aggregate_writes=0

# APPEND TO FILE
append_to_file=0

# MAX FD
max_fd=4096

# MAX PACKET AGE
max_packet_age=30

# MAX TIMESTAMP VARIANCE
max_timestamp_variance=90

# LOGGING
use_syslog=1
log_file=/var/log/nsca.log

# DEBUGGING
debug=0

# TIMEOUT
# timeout=10

# BUFFER SIZE
# buffer_size=2048

# QUEUE HIGH WATERMARK
# queue_high_watermark=1000

# QUEUE LOW WATERMARK
# queue_low_watermark=100
