# =============================================================================
# Nagios Self-Monitoring
# =============================================================================

define service {
    use                     generic-service
    host_name               localhost
    service_description     Nagios Process
    check_command           check_nagios!5!/opt/nagios/var/status.dat
    check_interval          5
    retry_interval          1
    max_check_attempts      3
    check_period            24x7
    notification_interval   30
    notification_period     24x7
    notifications_enabled   1
}

define service {
    use                     generic-service
    host_name               localhost
    service_description     Current Load
    check_command           check_load!5.0!4.0!3.0!10.0!6.0!4.0
    check_interval          5
    retry_interval          1
    max_check_attempts      3
}

define service {
    use                     generic-service
    host_name               localhost
    service_description     Current Users
    check_command           check_users!20!50
    check_interval          5
    retry_interval          1
    max_check_attempts      3
}

define service {
    use                     generic-service
    host_name               localhost
    service_description     Total Processes
    check_command           check_procs!250!400!RSZDT
    check_interval          5
    retry_interval          1
    max_check_attempts      3
}

define service {
    use                     generic-service
    host_name               localhost
    service_description     Disk Space
    check_command           check_disk!20%!10%!/
    check_interval          5
    retry_interval          1
    max_check_attempts      3
}

define service {
    use                     generic-service
    host_name               localhost
    service_description     Zombie Processes
    check_command           check_zombie_procs!5!10
    check_interval          5
    retry_interval          1
    max_check_attempts      3
}

# =============================================================================
# Service Groups
# =============================================================================

define servicegroup {
    servicegroup_name       web-services
    alias                   Web Services
    members                 qazaqair-app,HTTP QazaqAir App,qazaqair-nginx,HTTP Nginx,qazaqair-nginx,HTTPS Nginx
}

define servicegroup {
    servicegroup_name       database-services
    alias                   Database Services
    members                 qazaqair-db,PostgreSQL
}

define servicegroup {
    servicegroup_name       monitoring-services
    alias                   Monitoring Stack
    members                 prometheus,Prometheus UI,grafana,Grafana UI,zabbix-server,Zabbix Server,graphite,Graphite UI,localhost,Nagios Process
}

define servicegroup {
    servicegroup_name       system-metrics
    alias                   System Metrics
    members                 qazaqair-app,CPU Load,qazaqair-app,Memory Usage,qazaqair-app,Disk Usage,qazaqair-db,CPU Load,qazaqair-db,Memory Usage,qazaqair-db,Disk Usage,localhost,Current Load,localhost,Current Users,localhost,Total Processes,localhost,Disk Space
}
