# QazaqAir Services Configuration for Nagios

# =============================================================================
# QazaqAir Application Services
# =============================================================================

define service {
    use                     generic-service
    host_name               qazaqair-app
    service_description     HTTP QazaqAir App
    check_command           check_http!-p 8000
    check_interval          5
    retry_interval          1
    max_check_attempts      3
    check_period            24x7
    notification_interval   30
    notification_period     24x7
    notifications_enabled   1
}

define service {
    use                     generic-service
    host_name               qazaqair-app
    service_description     SSH QazaqAir App
    check_command           check_ssh!2222
    check_interval          5
    retry_interval          1
    max_check_attempts      3
    check_period            24x7
    notification_interval   30
    notification_period     24x7
    notifications_enabled   1
}

