modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_http_versions:
        - "1.1"
        - "2.0"
      valid_status_codes: []
      method: GET
      follow_redirects: true
      fail_if_ssl: false
      fail_if_not_ssl: false
      tls_config:
        insecure_skip_verify: true
      preferred_ip_protocol: "ip4"

  http_post_2xx:
    prober: http
    timeout: 5s
    http:
      valid_http_versions:
        - "1.1"
        - "2.0"
      method: POST
      headers:
        Content-Type: application/json
      body: '{}'
      follow_redirects: true
      fail_if_ssl: false
      fail_if_not_ssl: false

  tcp_connect:
    prober: tcp
    timeout: 5s
    tcp:
      preferred_ip_protocol: "ip4"

  icmp:
    prober: icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: "ip4"
