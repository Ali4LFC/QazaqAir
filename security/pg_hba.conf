# PostgreSQL Client Authentication Configuration File (pg_hba.conf)
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# "local" is for Unix domain socket connections only
local   all             postgres                                peer
local   all             all                                     md5

# IPv4 local connections:
host    all             all             127.0.0.1/32            md5
host    all             all             0.0.0.0/0               md5

# IPv6 local connections:
host    all             all             ::1/128                 md5

# Allow replication connections from localhost, by a user with the
# replication privilege.
local   replication     all                                     peer
host    replication     all             127.0.0.1/32            md5
host    replication     all             ::1/128                 md5

# Docker network connections
host    all             all             172.16.0.0/12           md5
host    all             all             172.17.0.0/16           md5
host    all             all             172.18.0.0/16           md5

# Application-specific connections
host    airmonitor      qazaqair_app    172.16.0.0/12           md5
host    airmonitor      qazaqair_readonly 172.16.0.0/12       md5
host    airmonitor      qazaqair_backup 172.16.0.0/12          md5
host    airmonitor      zabbix_monitor  172.16.0.0/12           md5

# Monitoring connections
host    all             zabbix_monitor  172.16.0.0/12           md5

# SSL connections (require SSL for external connections)
hostssl all             all             0.0.0.0/0               md5
hostssl all             all             ::/0                    md5

# Specific external access (restrictive)
host    airmonitor      qazaqair_app    192.168.1.0/24          md5
host    airmonitor      qazaqair_backup 192.168.1.0/24          md5
