# Ansible Inventory for QazaqAir Infrastructure
# Module 9: IaC - Infrastructure as Code

[local]
localhost ansible_connection=local

[docker_hosts]
localhost ansible_connection=local

[production]
# Add production servers here
# server1 ansible_host=192.168.1.10 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

[staging]
# Add staging servers here

[all:vars]
ansible_python_interpreter=/usr/bin/python3
project_name=qazaqair
environment=production

[production:vars]
ansible_python_interpreter=/usr/bin/python3
environment=production

[staging:vars]
ansible_python_interpreter=/usr/bin/python3
environment=staging
