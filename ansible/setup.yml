---
# Ansible Playbook: Initial Server Setup for QazaqAir
# Module 9: IaC - Infrastructure as Code

- name: QazaqAir Initial Server Setup
  hosts: docker_hosts
  become: yes
  gather_facts: yes

  vars:
    project_name: qazaqair
    app_user: qazaqair
    app_group: qazaqair
    app_dir: /opt/qazaqair
    docker_version: "24.0"
    compose_version: "2.20"
    required_packages:
      - curl
      - wget
      - git
      - htop
      - vim
      - net-tools
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
      - software-properties-common
      - python3
      - python3-pip
      - python3-venv
      - jq
      - tree
      - unzip

  tasks:
    # =========================================================================
    # SYSTEM UPDATE AND BASIC PACKAGES
    # =========================================================================
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      tags: [packages]

    - name: Upgrade all packages
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes
      tags: [packages]

    - name: Install required packages
      apt:
        name: "{{ required_packages }}"
        state: present
      tags: [packages]

    # =========================================================================
    # CREATE APPLICATION USER AND DIRECTORY
    # =========================================================================
    - name: Create application group
      group:
        name: "{{ app_group }}"
        state: present
      tags: [user]

    - name: Create application user
      user:
        name: "{{ app_user }}"
        group: "{{ app_group }}"
        shell: /bin/bash
        home: "/home/{{ app_user }}"
        createhome: yes
        state: present
      tags: [user]

    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: '0755'
      tags: [directories]

    - name: Create subdirectories
      file:
        path: "{{ app_dir }}/{{ item }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: '0755'
      loop:
        - backups
        - logs
        - certs
        - config
      tags: [directories]

    # =========================================================================
    # DOCKER INSTALLATION
    # =========================================================================
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      tags: [docker]

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        update_cache: yes
      tags: [docker]

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
      tags: [docker]

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes
      tags: [docker]

    - name: Add app user to docker group
      user:
        name: "{{ app_user }}"
        groups: docker
        append: yes
      tags: [docker]

    # =========================================================================
    # DOCKER COMPOSE INSTALLATION (standalone)
    # =========================================================================
    - name: Check if docker-compose is installed
      command: docker-compose --version
      register: compose_check
      ignore_errors: yes
      changed_when: false
      tags: [compose]

    - name: Install Docker Compose
      get_url:
        url: "https://github.com/docker/compose/releases/download/v{{ compose_version }}.0/docker-compose-{{ ansible_system }}-{{ ansible_architecture }}"
        dest: /usr/local/bin/docker-compose
        mode: '0755'
      when: compose_check.rc != 0
      tags: [compose]

    # =========================================================================
    # TIMEZONE CONFIGURATION
    # =========================================================================
    - name: Set timezone to Asia/Almaty (Kazakhstan)
      timezone:
        name: Asia/Almaty
      tags: [timezone]

    # =========================================================================
    # LOG ROTATION SETUP
    # =========================================================================
    - name: Create logrotate config for QazaqAir
      copy:
        dest: /etc/logrotate.d/qazaqair
        content: |
          /opt/qazaqair/logs/*.log {
              daily
              missingok
              rotate 14
              compress
              delaycompress
              notifempty
              create 0640 qazaqair qazaqair
          }
        mode: '0644'
      tags: [logs]

    # =========================================================================
    # SYSTEM OPTIMIZATION FOR DOCKER
    # =========================================================================
    - name: Configure sysctl for Docker
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { name: 'net.ipv4.ip_forward', value: '1' }
        - { name: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { name: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { name: 'vm.overcommit_memory', value: '1' }
      tags: [sysctl]

    # =========================================================================
    # CREATE SYSTEMD SERVICE FOR QAZAQAIR
    # =========================================================================
    - name: Create systemd service file
      copy:
        dest: /etc/systemd/system/qazaqair.service
        content: |
          [Unit]
          Description=QazaqAir Application Stack
          Requires=docker.service
          After=docker.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          WorkingDirectory={{ app_dir }}
          User={{ app_user }}
          Group={{ app_group }}
          ExecStart=/usr/local/bin/docker-compose up -d
          ExecStop=/usr/local/bin/docker-compose down
          TimeoutStartSec=0

          [Install]
          WantedBy=multi-user.target
        mode: '0644'
      tags: [service]

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes
      tags: [service]

    - name: Enable QazaqAir service
      systemd:
        name: qazaqair
        enabled: yes
      tags: [service]

    # =========================================================================
    # VERIFICATION
    # =========================================================================
    - name: Verify Docker installation
      command: docker --version
      register: docker_version_output
      changed_when: false
      tags: [verify]

    - name: Verify Docker Compose installation
      command: docker-compose --version
      register: compose_version_output
      changed_when: false
      tags: [verify]

    - name: Print installation summary
      debug:
        msg:
          - "Docker version: {{ docker_version_output.stdout }}"
          - "Docker Compose version: {{ compose_version_output.stdout }}"
          - "Application directory: {{ app_dir }}"
          - "Application user: {{ app_user }}"
          - "Timezone: Asia/Almaty"
      tags: [verify]

  handlers:
    - name: restart docker
      systemd:
        name: docker
        state: restarted
