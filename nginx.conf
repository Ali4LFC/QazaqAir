server {
    listen 80;
    server_name localhost;

    # Прокси для backend API
    location /api/ {
        proxy_pass http://qazaqair-backend-1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Прокси для frontend_new (React app)
    location /app/ {
        proxy_pass http://qazaqair-frontend-1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Основной сайт QazaqAir
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ =404;
    }

    # Прокси для n8n
    location /n8n/ {
        proxy_pass http://qazaqair-n8n-1:5678/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Прокси для Grafana
    location /grafana/ {
        proxy_pass http://qazaqair-grafana-1:3000/;
        proxy_set_header Host $host;
    }

    # Nginx status page for Prometheus exporter
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 172.20.0.0/16;  # Docker network
        allow 127.0.0.1;
        deny all;
    }
}
