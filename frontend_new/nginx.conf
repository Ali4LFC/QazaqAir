server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Статические файлы с кешированием (приоритетный)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Прокси для API запросов к backend
    location /api/ {
        proxy_pass https://qazaqair-backend-1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Отключаем проверку SSL сертификата для локальной сети
        proxy_ssl_verify off;
        proxy_ssl_server_name off;
        # Дополнительные настройки для SSL
        proxy_ssl_session_reuse off;
    }

    # Обработка React Router (SPA) - последняя
    location / {
        try_files $uri $uri/ /index.html;
    }
}
