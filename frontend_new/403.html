<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>403 — Доступ запрещён</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: #0d1117;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #f0f6fc;
      }
      .card {
        max-width: 560px;
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(22, 27, 34, 0.8);
        border-radius: 16px;
        padding: 32px;
        text-align: center;
      }
      .title {
        font-size: 1.8rem;
        margin-bottom: 16px;
        font-weight: 600;
      }
      .desc {
        color: #8b949e;
        margin-bottom: 20px;
        line-height: 1.5;
      }
      .hint {
        font-size: 0.9rem;
        color: #8b949e;
        margin-bottom: 24px;
      }
      .btn {
        display: inline-block;
        padding: 10px 20px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: #21262d;
        color: #f0f6fc;
        text-decoration: none;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #30363d;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="title">403 — Доступ запрещён</div>
      <div class="desc">
        Ваш IP не входит в список разрешённых или находится в списке блокировки.
      </div>
      <div class="hint">
        Если вы администратор, проверьте переменные окружения:<br />
        <b>ALLOWED_IPS</b>, <b>BLOCKED_IPS</b> и <b>TRUST_X_FORWARDED</b>
      </div>
      <a class="btn" href="/">На главную</a>
    </div>
  </body>
</html>
