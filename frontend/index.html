<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QazaqAir - Ауа сапасы</title>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="static/style.css" />
  </head>
  <body>
    <div class="app-container">
      <header>
        <div class="logo">
          <span class="pulse-icon"></span>
          <h1>QazaqAir</h1>
        </div>
        <div class="actions">
          <button
            id="menu-toggle"
            class="icon-btn"
            title="Регионы"
            aria-label="Регионы"
          >
            <span>☰</span>
          </button>
          <button
            id="lang-toggle"
            class="icon-btn text-btn"
            title="Тілді ауыстыру"
            aria-label="Тілді ауыстыру"
          >
            <span id="lang-text">kk</span>
          </button>
          <button
            id="theme-toggle"
            class="icon-btn"
            title="Сменить тему"
            aria-label="Сменить тему"
          >
            <span id="theme-icon">🌙</span>
          </button>
          <div id="last-update" class="status-badge">Жаңартылды: --:--:--</div>
        </div>
      </header>

      <div id="side-overlay" class="side-overlay"></div>
      <aside id="side-panel" class="side-panel">
        <div class="side-header">
          <div id="side-title" class="regions-title">Қазақстан аймақтары</div>
          <button
            id="side-close"
            class="icon-btn"
            title="Жабу"
            aria-label="Жабу"
          >
            ✕
          </button>
        </div>
        <div class="region-search">
          <input
            id="region-search-input"
            type="text"
            placeholder="Аймақты іздеу..."
            aria-label="Аймақты іздеу"
          />
        </div>
        <div id="side-list" class="regions-list"></div>
        <div id="region-info" class="region-info card glass">
          <div id="region-info-title" class="summary-title">Аймақ бойынша ақпарат</div>
          <div id="region-info-body" class="region-info-body">
            Аймақты таңдаңыз
          </div>
        </div>
      </aside>

      <main>
        <div class="dashboard-grid">
          <!-- Data Panel -->
          <div class="card data-card glass">
            <div id="region-name" class="city-name">Астана, Қазақстан</div>
            <div id="aqi-value" class="aqi-main">--</div>
            <div id="aqi-caption" class="aqi-caption">Ауа сапасының индексі (AQI)</div>
            <div id="aqi-status" class="aqi-status">Жүктелуде...</div>

            <div class="weather-grid">
              <div class="weather-item">
                <span id="label-temp" class="label">Температура</span>
                <span id="temp-value" class="value">--°C</span>
              </div>
              <div class="weather-item">
                <span id="label-hum" class="label">Ылғалдылық</span>
                <span id="humidity-value" class="value">--%</span>
              </div>
              <div class="weather-item">
                <span id="label-wind" class="label">Жел</span>
                <span id="wind-value" class="value">-- м/с</span>
              </div>
            </div>
          </div>

          <!-- Map Panel -->
          <div class="card map-card glass">
            <div id="map"></div>
          </div>
        </div>

        <div class="summary-grid">
          <div class="card glass">
            <div id="dirty-title" class="summary-title">Ең лас (топ-10)</div>
            <div id="dirty-list" class="rank-list"></div>
          </div>
          <div class="card glass">
            <div id="clean-title" class="summary-title">Ең таза (топ-10)</div>
            <div id="clean-list" class="rank-list"></div>
          </div>
        </div>
      </main>

      <footer>
        <p id="footer-text">Мәліметтер IQAir API арқылы алынды • Әр 60 секунд сайын жаңартылады.</p>
      </footer>
    </div>

    <!-- Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="static/script.js"></script>
  </body>
</html>
