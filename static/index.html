<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Air Astana - Качество воздуха в Астане</title>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="static/style.css" />
  </head>
  <body>
    <div class="app-container">
      <header>
        <div class="logo">
          <span class="pulse-icon"></span>
          <h1>Air Astana Monitor</h1>
        </div>
        <div class="actions">
          <button id="menu-toggle" class="icon-btn" title="Регионы" aria-label="Регионы">
            <span>☰</span>
          </button>
          <button
            id="theme-toggle"
            class="icon-btn"
            title="Сменить тему"
            aria-label="Сменить тему"
          >
            <span id="theme-icon">🌙</span>
          </button>
          <div id="last-update" class="status-badge">Обновление: --:--:--</div>
        </div>
      </header>

      <div id="side-overlay" class="side-overlay"></div>
      <aside id="side-panel" class="side-panel">
        <div class="side-header">
          <div class="regions-title">Регионы Казахстана</div>
          <button id="side-close" class="icon-btn" title="Закрыть" aria-label="Закрыть">✕</button>
        </div>
        <div id="side-list" class="regions-list"></div>
        <div id="region-info" class="region-info card glass">
          <div class="summary-title">Информация по региону</div>
          <div id="region-info-body" class="region-info-body">Выберите регион</div>
        </div>
      </aside>

      <main>
        <div class="dashboard-grid">
          <!-- Data Panel -->
          <div class="card data-card glass">
            <div id="region-name" class="city-name">Астана, Казахстан</div>
            <div id="aqi-value" class="aqi-main">--</div>
            <div id="aqi-status" class="aqi-status">Загрузка...</div>

            <div class="weather-grid">
              <div class="weather-item">
                <span class="label">Температура</span>
                <span id="temp-value" class="value">--°C</span>
              </div>
              <div class="weather-item">
                <span class="label">Влажность</span>
                <span id="humidity-value" class="value">--%</span>
              </div>
              <div class="weather-item">
                <span class="label">Ветер</span>
                <span id="wind-value" class="value">-- м/с</span>
              </div>
            </div>
          </div>

          <!-- Map Panel -->
          <div class="card map-card glass">
            <div id="map"></div>
          </div>
        </div>

        <div class="summary-grid">
          <div class="card glass">
            <div class="summary-title">Самые загрязненные (топ‑10)</div>
            <div id="dirty-list" class="rank-list"></div>
          </div>
          <div class="card glass">
            <div class="summary-title">Самые чистые (топ‑10)</div>
            <div id="clean-list" class="rank-list"></div>
          </div>
        </div>
      </main>

      <footer>
        <p>Данные предоставлены IQAir API • Обновление каждые 30 сек.</p>
      </footer>
    </div>

    <!-- Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="static/script.js"></script>
  </body>
</html>
